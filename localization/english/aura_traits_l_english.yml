 # --- Cultivation realm traits ---
 aura_realm_initiate:0 "Chi Initiate"
 aura_realm_initiate_desc:0 "Has awakened to the Chi flowing through the world and taken the first step on the path of cultivation."
 aura_realm_adept:0 "Aura Adept"
 aura_realm_adept_desc:0 "Has forged a stable personal aura from refined Chi."
 aura_realm_warrior:0 "Aura Warrior"
 aura_realm_warrior_desc:0 "Can manifest their aura in battle, striking far above mortal limits."
 aura_realm_master:0 "Aura Master"
 aura_realm_master_desc:0 "A master of the aura whose command of the elements deepens."
 aura_realm_grandmaster:0 "Aura Grandmaster"
 aura_realm_grandmaster_desc:0 "A grandmaster whose techniques and presence overwhelm lesser cultivators."
 aura_realm_sovereign:0 "Aura Sovereign"
 aura_realm_sovereign_desc:0 "An aura sovereign who dominates any battlefield they set foot upon."
 aura_realm_ascendant:0 "Ascendant"
 aura_realm_ascendant_desc:0 "Has passed the Heavenly Ascension and stands at the peak of mortal cultivation."

