 aura_element_water:0 "Water Aura"
 aura_element_water_desc:0 "Channels the flowing, restorative element of Water."
 aura_element_light:0 "Light Aura"
 aura_element_light_desc:0 "Channels the radiant, revealing element of Light."
 aura_element_darkness:0 "Darkness Aura"
