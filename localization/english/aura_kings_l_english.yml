l_english:
 # --- Decisions ---
 aura_begin_martial_training_decision:0 "Begin Martial Training"
 aura_begin_martial_training_decision_desc:0 "Turn away from the life of a mere mortal. Seek out a teacher, a hidden manual, or wrest the secrets from your own flesh, and forge your first mortal cores."
 aura_begin_martial_training_decision_tooltip:0 "Become a Martial Artist and forge your first mortal cores"

 aura_gather_pressure_decision:0 "Gather Aura Pressure"
 aura_gather_pressure_decision_desc:0 "Draw the world's natural energy into your body, building the Aura Pressure that one day may be condensed into immortal cores."
 aura_gather_pressure_decision_tooltip:0 "Gain Aura Pressure (total and free)"

 aura_awaken_cultivation_decision:0 "Awaken the Immortal Cores"
 aura_awaken_cultivation_decision_desc:0 "You have gathered enough Aura Pressure. Condense it inward, awaken your first immortal core, and become a true Cultivator."
 aura_awaken_cultivation_decision_tooltip:0 "Become a Cultivator and condense your first immortal core"

 aura_condense_core_decision:0 "Condense an Immortal Core"
 aura_condense_core_decision_desc:0 "Force more of your free Aura Pressure inward, condensing another immortal core to deepen your power."
 aura_condense_core_decision_tooltip:0 "Spend free Aura Pressure to condense another immortal core"

 # --- Events ---
 aura_kings.0001.t:0 "The First Step"
 aura_kings.0001.desc:0 "Day after day of brutal training finally bears fruit. You feel the natural energy of the world answer your call, and the first mortal cores take shape within Power, Fortitude, Agility, and Soul. You are a Martial Artist now."
 aura_kings.0001.a:0 "My path begins."

 aura_kings.0003.t:0 "Awakening"
 aura_kings.0003.desc:0 "Your gathered Aura Pressure churns, demanding form. There is no turning back now — you must condense your very first immortal core. Into which will it crystallize?"
 aura_kings.0003.power:0 "Power — awaken an immortal Power core."
 aura_kings.0003.fortitude:0 "Fortitude — awaken an immortal Fortitude core."
 aura_kings.0003.agility:0 "Agility — awaken an immortal Agility core."
 aura_kings.0003.soul:0 "Soul — awaken an immortal Soul core."

 aura_kings.0004.t:0 "Forge Your Foundation"
 aura_kings.0004.desc:0 "With your first immortal core set, your aura must take on a stable form — a Foundation that will carry you all the way to Ascension. You sense a Zodiac symbol calling to your spirit..."
 aura_kings.0004.inherit:0 "Follow your forebear's path."
 aura_kings.0004.boar:0 "The Boar — endurance and survival."
 aura_kings.0004.crane:0 "The Crane — perception and foresight."
 aura_kings.0004.dragon:0 "The Dragon — sovereign majesty."
 aura_kings.0004.monkey:0 "The Monkey — cunning and thievery."
 aura_kings.0004.ox:0 "The Ox — industry and craft."
 aura_kings.0004.rabbit:0 "The Rabbit — vitality and alchemy."
 aura_kings.0004.ram:0 "The Ram — wisdom and lore."
 aura_kings.0004.rat:0 "The Rat — survival and stealth."
 aura_kings.0004.serpent:0 "The Serpent — deception."
 aura_kings.0004.stallion:0 "The Stallion — speed and athletics."
 aura_kings.0004.tiger:0 "The Tiger — majesty and persuasion."
 aura_kings.0004.wolf:0 "The Wolf — insight and the pack."

 aura_kings.0002.t:0 "Condense an Immortal Core"
 aura_kings.0002.desc:0 "You press your gathered Aura Pressure inward, seeking a core to harden into something immortal. Into which will you force your power?"
 aura_kings.0002.power:0 "Power — condense an immortal Power core."
 aura_kings.0002.fortitude:0 "Fortitude — condense an immortal Fortitude core."
 aura_kings.0002.agility:0 "Agility — condense an immortal Agility core."
 aura_kings.0002.soul:0 "Soul — condense an immortal Soul core."
 aura_kings.0002.cancel:0 "Not yet — hold my Aura Pressure for now."
